<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アリア コンシェルジュ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f5f4f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 16px; }
.app { display: flex; gap: 0; width: 100%; max-width: 700px; height: 580px; border: 1px solid #ddd; border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin: auto; }
.sidebar { width: 160px; flex-shrink: 0; background: #faf9f7; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding: 20px 12px 12px; gap: 6px; }
.char-img { width: 110px; height: 110px; object-fit: contain; }
.char-name { font-size: 14px; font-weight: 600; color: #333; margin-top: 2px; }
.char-role { font-size: 11px; color: #888; text-align: center; line-height: 1.5; }
.mood-pill { font-size: 11px; color: #534AB7; background: #EEEDFE; border-radius: 20px; padding: 3px 12px; margin-top: 4px; }
.sidebar-btns { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-top: 10px; }
.side-btn { font-size: 11px; color: #555; background: white; border: 1px solid #eee; border-radius: 8px; padding: 6px 8px; cursor: pointer; text-align: center; line-height: 1.4; }
.side-btn:hover { background: #f0effc; color: #3C3489; border-color: #AFA9EC; }
.side-btn.danger { color: #A32D2D; border-color: #F7C1C1; }
.side-btn.danger:hover { background: #FCEBEB; }
.side-btn.accent { background: #534AB7; color: white; border-color: #534AB7; }
.side-btn.accent:hover { background: #3C3489; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.header { padding: 10px 14px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 13px; color: #888; }
.history-count { font-size: 11px; color: #aaa; background: #f3f2f8; border-radius: 20px; padding: 2px 10px; }
.chat-log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.bubble { max-width: 78%; font-size: 14px; line-height: 1.7; padding: 10px 14px; border-radius: 14px; word-break: break-word; }
.msg.aria .bubble { background: #f3f2f8; color: #222; border-bottom-left-radius: 4px; }
.msg.user .bubble { background: #EEEDFE; color: #26215C; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: #bbb; margin-top: 3px; }
.msg.user .msg-time { text-align: right; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: #534AB7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; }
.typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; background: #f3f2f8; border-radius: 14px; border-bottom-left-radius: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.quick-btns { display: flex; flex-direction: column; gap: 4px; padding: 0 14px 8px; }
.qbtn { font-size: 12px; color: #555; background: #faf9f7; border: 1px solid #eee; border-radius: 8px; padding: 7px 10px; cursor: pointer; text-align: left; }
.qbtn:hover { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
.input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #eee; }
#user-input { flex: 1; font-size: 14px; padding: 9px 12px; border-radius: 10px; border: 1px solid #ddd; background: white; color: #222; resize: none; height: 40px; font-family: sans-serif; }
#user-input:focus { outline: none; border-color: #7F77DD; }
#send-btn { padding: 0 16px; border-radius: 10px; border: none; background: #534AB7; color: white; font-size: 13px; font-weight: 600; cursor: pointer; height: 40px; }
#send-btn:hover { background: #3C3489; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.day-sep { text-align: center; font-size: 11px; color: #bbb; margin: 2px 0; }
.day-sep::before, .day-sep::after { content:''; display:inline-block; width:50px; height:1px; background:#eee; vertical-align:middle; margin:0 6px; }
.modal-bg { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.35); border-radius: 16px; align-items: center; justify-content: center; z-index: 10; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 14px; padding: 22px 22px 18px; width: 300px; max-width: 90%; }
.modal h3 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 8px; }
.modal p { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 14px; }
.modal-btns { display: flex; flex-direction: column; gap: 8px; }
.modal-btn { font-size: 13px; padding: 9px 14px; border-radius: 9px; border: 1px solid #ddd; background: #faf9f7; color: #333; cursor: pointer; text-align: center; }
.modal-btn:hover { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
.modal-btn.primary { background: #534AB7; color: white; border-color: #534AB7; }
.modal-btn.primary:hover { background: #3C3489; }
.modal-close { font-size: 12px; color: #aaa; text-align: center; margin-top: 10px; cursor: pointer; }
.modal-close:hover { color: #666; }
.toast { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; font-size: 12px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 20; }
.toast.show { opacity: 1; }
</style>
</head>

    </div>
    <div class="input-row">

const STORAGE_KEY = "aria_history";
const MAX_HISTORY = 40;

const SYSTEM = `あなたは「アリア」という名前の親しみやすいAIコンシェルジュです。
ユーザーの情報整理・相談・調査などを温かくサポートします。
返答の末尾に必ず以下のJSONを付けてください（本文とは別行）:
MOOD:{"mood":"happy"または"normal"}
happyは：お礼・褒め・うれしい内容のとき。normalはそれ以外。
返答は日本語で200字以内を目安に。`;

let history = [];
let displayLog = [];

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const d = JSON.parse(saved); history = d.history||[]; displayLog = d.displayLog||[]; }
  } catch(e) { history=[]; displayLog=[]; }
}

function saveHistory() {
  try {
    history = history.slice(-MAX_HISTORY);
    displayLog = displayLog.slice(-MAX_HISTORY);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ history, displayLog }));
  } catch(e) {}
}

function updateCount() {
  document.getElementById('history-count').textContent = Math.floor(history.length/2) + ' 件';
}

function fmt(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
}

function renderAll() {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';
  if (!displayLog.length) {
    appendAriaMsg('こんにちは！アリアです。前回の続きからでも、新しい話題でも気軽にどうぞ。', Date.now());
    return;
  }
  let lastDate = '';
  displayLog.forEach(item => {
    const d = fmtDate(item.ts);
    if (d !== lastDate) { const s=document.createElement('div'); s.className='day-sep'; s.textContent=d; log.appendChild(s); lastDate=d; }
    appendMsgEl(item.role, item.text, item.ts);
  });
  log.scrollTop = log.scrollHeight;
  if (displayLog.length) document.getElementById('quick-btns').style.display='none';
}

function appendMsgEl(role, text, ts) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  if (role==='aria') {
    div.innerHTML = `<div class="avatar">A</div><div><div class="bubble"></div><div class="msg-time">${fmt(ts)}</div></div>`;
  } else {
    div.innerHTML = `<div><div class="bubble"></div><div class="msg-time">${fmt(ts)}</div></div>`;
  }
  div.querySelector('.bubble').textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendAriaMsg(text, ts) { appendMsgEl('aria', text, ts); }
function appendUserMsg(text, ts) { appendMsgEl('user', text, ts); }

function setMood(mood) {
  const img = document.getElementById('char-img');
  const pill = document.getElementById('mood-text');
  if (mood==='happy') { img.src=IMG_HAPPY; pill.textContent='うれしい'; pill.style.background='#FFF3E0'; pill.style.color='#854F0B'; }
  else { img.src=IMG_NORMAL; pill.textContent='通常'; pill.style.background='#EEEDFE'; pill.style.color='#534AB7'; }
}

function showTyping() {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className='msg aria'; div.id='typing-msg';
  div.innerHTML=`<div class="avatar">A</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  log.appendChild(div); log.scrollTop=log.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing-msg'); if(t) t.remove(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function clearHistory() {
  if (!confirm('会話の履歴をすべて消去しますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  history=[]; displayLog=[];
  document.getElementById('chat-log').innerHTML='';
  document.getElementById('quick-btns').style.display='flex';
  updateCount(); setMood('normal');
  appendAriaMsg('履歴を消去しました。また新たにお話しましょう！', Date.now());
  showToast('履歴を消去しました');
}

function exportLog() {
  if (!displayLog.length) { showToast('会話履歴がありません'); return; }
  let text = '=== アリアとの会話ログ ===\n\n';
  let lastDate='';
  displayLog.forEach(item => {
    const d=fmtDate(item.ts);
    if(d!==lastDate){text+=`--- ${d} ---\n`;lastDate=d;}
    text+=`[${fmt(item.ts)}] ${item.role==='aria'?'アリア':'あなた'}: ${item.text}\n\n`;
  });
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='aria_log_'+new Date().toISOString().slice(0,10)+'.txt'; a.click();
  showToast('ログを保存しました');
}

function openSyncModal() { document.getElementById('sync-modal').classList.add('open'); }
function closeSyncModal() { document.getElementById('sync-modal').classList.remove('open'); }

function exportForSync() {
  if (!displayLog.length && !history.length) { showToast('会話履歴がありません'); return; }
  const data = JSON.stringify({ history, displayLog, exportedAt: Date.now() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aria_sync_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  closeSyncModal();
  showToast('書き出しました。Google Driveに保存してください');
}

function importFromFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.history || !data.displayLog) throw new Error();
      if (!confirm(`${Math.floor(data.history.length/2)}件の履歴を読み込みます。現在の履歴は上書きされます。よろしいですか？`)) return;
      history = data.history;
      displayLog = data.displayLog;
      saveHistory();
      updateCount();
      renderAll();
      closeSyncModal();
      showToast('履歴を読み込みました');
    } catch(err) {
      showToast('ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

async function sendMsg() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value='';
  document.getElementById('quick-btns').style.display='none';
  document.getElementById('send-btn').disabled=true;
  const ts = Date.now();
  appendUserMsg(text, ts);
  history.push({ role:'user', content:text });
  displayLog.push({ role:'user', text, ts });
  showTyping();

  try {
    const res = await fetch('https://aria-proxy.ueasfviivjg.workers.dev', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM, messages:history })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || 'すみません、うまく返答できませんでした。';
    const moodMatch = raw.match(/MOOD:\{"mood":"(\w+)"\}/);
    const mood = moodMatch ? moodMatch[1] : 'normal';
    const clean = raw.replace(/\nMOOD:\{.*?\}/,'').trim();
    history.push({ role:'assistant', content:raw });
    const replyTs = Date.now();
    displayLog.push({ role:'aria', text:clean, ts:replyTs });
    saveHistory(); updateCount();
    removeTyping(); setMood(mood);
    appendAriaMsg(clean, replyTs);
  } catch(e) {
    removeTyping();
    appendAriaMsg('通信エラーが発生しました。しばらくしてからお試しください。', Date.now());
  }
  document.getElementById('send-btn').disabled=false;
}

function quickSend(text) { document.getElementById('user-input').value=text; sendMsg(); }

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

loadHistory(); renderAll(); updateCount();
</script>
</body>
</html>
