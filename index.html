<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>アリア コンシェルジュ</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: sans-serif; background: #f5f4f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100%; padding: 16px; }
.app { display: flex; flex-direction: column; width: 100%; max-width: 780px; height: 620px; border: 1px solid #ddd; border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin: auto; position: relative; }
.topbar { display: flex; align-items: center; gap: 8px; padding: 7px 14px; background: #faf9f7; border-bottom: 1px solid #eee; flex-shrink: 0; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.gray { background: #ccc; }
.status-dot.green { background: #1D9E75; }
.status-dot.orange { background: #EF9F27; animation: pulse 1s infinite; }
.status-dot.red { background: #E24B4A; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { font-size: 11px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-badge { font-size: 11px; color: #085041; background: #E1F5EE; border-radius: 20px; padding: 2px 8px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.login-btn-small { font-size: 11px; color: #534AB7; background: #EEEDFE; border: none; border-radius: 20px; padding: 3px 10px; cursor: pointer; }
.body-row { flex: 1; display: flex; overflow: hidden; }
.left-panel { width: 150px; flex-shrink: 0; background: #faf9f7; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding: 14px 10px; gap: 8px; overflow-y: auto; }
.char-img { width: 110px; height: 110px; object-fit: contain; transition: opacity 0.2s; }
.char-name { font-size: 14px; font-weight: 600; color: #333; }
.mood-pill { font-size: 11px; color: #534AB7; background: #EEEDFE; border-radius: 20px; padding: 3px 10px; }
.panel-section { width: 100%; }
.panel-label { font-size: 10px; color: #aaa; margin-bottom: 5px; padding-left: 2px; }
.task-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #333; background: white; border: 1px solid #eee; border-radius: 6px; padding: 5px 7px; margin-bottom: 4px; cursor: pointer; }
.task-item.done { color: #aaa; text-decoration: line-through; }
.task-item .task-check { width: 12px; height: 12px; border-radius: 3px; border: 1.5px solid #AFA9EC; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.task-item.done .task-check { background: #534AB7; border-color: #534AB7; }
.task-item .task-check::after { content: ''; display: none; }
.task-item.done .task-check::after { display: block; width: 5px; height: 3px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translate(1px, -1px); }
.task-urgent { color: #E24B4A; font-size: 9px; margin-left: auto; flex-shrink: 0; }
.side-btn { width: 100%; font-size: 10px; color: #555; background: white; border: 1px solid #eee; border-radius: 6px; padding: 5px 6px; cursor: pointer; text-align: center; }
.side-btn:hover { background: #f0effc; color: #3C3489; }
.side-btn.danger { color: #A32D2D; border-color: #F7C1C1; }
.side-btn.danger:hover { background: #FCEBEB; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header { padding: 8px 14px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.chat-header-title { font-size: 13px; color: #888; }
.history-count { font-size: 11px; color: #aaa; background: #f3f2f8; border-radius: 20px; padding: 2px 10px; }
.chat-log { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.bubble { max-width: 78%; font-size: 14px; line-height: 1.7; padding: 10px 14px; border-radius: 14px; word-break: break-word; }
.msg.aria .bubble { background: #f3f2f8; color: #222; border-bottom-left-radius: 4px; }
.msg.user .bubble { background: #EEEDFE; color: #26215C; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: #bbb; margin-top: 3px; }
.msg.user .msg-time { text-align: right; }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: #534AB7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }
.typing { display: flex; gap: 5px; align-items: center; padding: 10px 14px; background: #f3f2f8; border-radius: 14px; border-bottom-left-radius: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.quick-btns { display: flex; flex-direction: column; gap: 4px; padding: 0 14px 8px; flex-shrink: 0; }
.qbtn { font-size: 12px; color: #555; background: #faf9f7; border: 1px solid #eee; border-radius: 8px; padding: 7px 10px; cursor: pointer; text-align: left; }
.qbtn:hover { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
.input-row { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #eee; flex-shrink: 0; }
#user-input { flex: 1; font-size: 14px; padding: 9px 12px; border-radius: 10px; border: 1px solid #ddd; background: white; color: #222; resize: none; height: 40px; font-family: sans-serif; }
#user-input:focus { outline: none; border-color: #7F77DD; }
#send-btn { padding: 0 16px; border-radius: 10px; border: none; background: #534AB7; color: white; font-size: 13px; font-weight: 600; cursor: pointer; height: 40px; }
#send-btn:hover { background: #3C3489; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.day-sep { text-align: center; font-size: 11px; color: #bbb; margin: 2px 0; }
.day-sep::before, .day-sep::after { content:''; display:inline-block; width:40px; height:1px; background:#eee; vertical-align:middle; margin:0 6px; }
.toast { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; font-size: 12px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 20; }
.toast.show { opacity: 1; }
.drawer-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 30; border-radius: 16px; }
.drawer-overlay.open { display: block; }
.drawer { position: absolute; top: 0; right: -220px; width: 200px; height: 100%; background: white; border-left: 1px solid #eee; z-index: 31; transition: right 0.25s ease; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; }
.drawer.open { right: 0; }
.drawer-char { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-bottom: 14px; border-bottom: 1px solid #eee; }
.drawer-btn { font-size: 13px; color: #555; background: #faf9f7; border: 1px solid #eee; border-radius: 8px; padding: 9px 12px; cursor: pointer; text-align: left; }
.drawer-btn:hover { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
.drawer-btn.danger { color: #A32D2D; border-color: #F7C1C1; }
.drawer-btn.danger:hover { background: #FCEBEB; }
.drawer-close { font-size: 12px; color: #aaa; text-align: center; cursor: pointer; margin-top: auto; }
.menu-btn { width: 30px; height: 30px; background: #EEEDFE; border: none; border-radius: 7px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 3px; flex-shrink: 0; }
.menu-btn span { display: block; width: 13px; height: 2px; background: #534AB7; border-radius: 1px; }
@media (max-width: 520px) {
  body { padding: 0; background: white; align-items: stretch; }
  .app { max-width: 100%; width: 100%; height: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
  .left-panel { display: none; }
  .topbar { padding-top: max(8px, env(safe-area-inset-top)); }
  .task-bar { display: flex !important; }
  .input-row { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  #user-input { font-size: 16px; }
  .bubble { font-size: 15px; }
  .toast { bottom: max(70px, calc(env(safe-area-inset-bottom) + 60px)); }
  .drawer-overlay { border-radius: 0; }
}
.task-bar { display: none; flex-shrink: 0; padding: 7px 12px; background: #faf9f7; border-bottom: 1px solid #eee; gap: 6px; flex-wrap: wrap; align-items: center; }
.task-bar-label { font-size: 10px; color: #aaa; flex-shrink: 0; }
.task-chip { font-size: 11px; color: #333; background: white; border: 1px solid #eee; border-radius: 20px; padding: 3px 9px; cursor: pointer; white-space: nowrap; }
.task-chip.done { color: #aaa; text-decoration: line-through; }
.task-chip.urgent { border-color: #F09595; color: #A32D2D; }

.login-overlay { position: absolute; inset: 0; background: rgba(249,248,247,0.96); z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; border-radius: 16px; }
.login-overlay.hidden { display: none; }
.login-overlay-img { width: 100px; height: 100px; object-fit: contain; }
.login-overlay-name { font-size: 18px; font-weight: 600; color: #333; }
.login-overlay-msg { font-size: 14px; color: #888; text-align: center; line-height: 1.7; }
.login-overlay-btn { font-size: 14px; font-weight: 600; color: white; background: #534AB7; border: none; border-radius: 10px; padding: 12px 28px; cursor: pointer; }
.login-overlay-btn:hover { background: #3C3489; }
@media (max-width: 520px) { .login-overlay { border-radius: 0; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="status-dot gray" id="status-dot"></div>
    <span class="status-text" id="status-text">Googleにログインすると履歴が同期されます</span>
    <span class="user-badge" id="user-badge" style="display:none"></span>
    <button class="login-btn-small" id="login-top-btn" onclick="signIn()">ログイン</button>
    <button class="menu-btn" id="menu-btn" style="display:none" onclick="openDrawer()"><span></span><span></span><span></span></button>
  </div>

  <div class="task-bar" id="task-bar">
    <span class="task-bar-label">タスク</span>
    <div id="task-chips"></div>
  </div>

  <div class="body-row">
    <div class="left-panel">
      <img id="char-img" class="char-img" src="" alt="アリア">
      <div class="char-name">アリア</div>
      <div class="mood-pill" id="mood-text">待機中</div>

      <div class="panel-section" id="task-panel" style="margin-top:4px;">
        <div class="panel-label">タスク</div>
        <div id="task-list"></div>
      </div>

      <div class="panel-section" style="margin-top:4px;">
        <div class="panel-label">メモ</div>
        <div id="memo-list" style="font-size:10px;color:#666;line-height:1.6;"></div>
      </div>

      <div style="margin-top:auto; display:flex; flex-direction:column; gap:4px; width:100%;">
        <button class="side-btn" id="login-side-btn" onclick="signIn()">Googleでログイン</button>
        <button class="side-btn danger" onclick="clearHistory()">履歴を消去</button>
      </div>
    </div>

    <div class="main">
      <div class="chat-header">
        <span class="chat-header-title">アリアとの会話</span>
        <span class="history-count" id="history-count">0 件</span>
      </div>
      <div class="chat-log" id="chat-log"></div>
      <div class="quick-btns" id="quick-btns">
        <button class="qbtn" onclick="quickSend('自己紹介してください')">アリアに自己紹介してもらう</button>
        <button class="qbtn" onclick="quickSend('今日のタスクを整理したいです')">タスクを整理する</button>
        <button class="qbtn" onclick="quickSend('最近の調子はどうですか、と聞いてください')">雑談する</button>
      </div>
      <div class="input-row">
        <textarea id="user-input" placeholder="アリアに話しかける..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMsg()">送信</button>
      </div>
    </div>
  </div>


  <div class="login-overlay" id="login-overlay">
    <img class="login-overlay-img" id="overlay-img" src="" alt="アリア">
    <div class="login-overlay-name">アリア</div>
    <div class="login-overlay-msg">AIコンシェルジュ アリアへようこそ。<br>Googleアカウントでログインして<br>会話を始めましょう。</div>
    <button class="login-overlay-btn" onclick="signIn()">Googleでログイン</button>
  </div>

  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-char">
      <img id="char-img-drawer" src="" alt="アリア" style="width:64px;height:64px;object-fit:contain;">
      <div style="font-size:13px;font-weight:600;color:#333;">アリア</div>
      <div style="font-size:11px;color:#888;">AIコンシェルジュ</div>
    </div>
    <button class="drawer-btn" id="login-drawer-btn" onclick="signIn()">Googleでログイン</button>
    <button class="drawer-btn danger" onclick="clearHistory();closeDrawer()">履歴を消去</button>
    <div class="drawer-close" onclick="closeDrawer()">閉じる</div>
  </div>

  <div class="toast" id="toast"></div>
</div>

let history = [];
let displayLog = [];

let accessToken = null;

let driveMemFileId = null;
let isSyncing = false;

['char-img','char-img-drawer','overlay-img'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.src = IMG_NORMAL;
});

function isMobile() { return window.innerWidth <= 520; }

window.addEventListener('resize', () => {
  document.getElementById('menu-btn').style.display = isMobile() ? 'flex' : 'none';
});

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function showOverlay() {
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('user-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
}

function hideOverlay() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('user-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
}

function setStatus(type, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = msg;
}

function setMood(mood) {
  const src = mood === 'happy' ? IMG_HAPPY : IMG_NORMAL;
  const label = mood === 'happy' ? 'うれしい' : '通常';
  const color = mood === 'happy' ? '#854F0B' : '#534AB7';
  ['char-img','char-img-drawer'].forEach(id => {
    const el = document.getElementById(id); if (el) el.src = src;
  });
  const pill = document.getElementById('mood-text');
  if (pill) { pill.textContent = label; pill.style.color = color; }
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const chips = document.getElementById('task-chips');
  const bar = document.getElementById('task-bar');
  if (!list) return;
  list.innerHTML = '';
  if (chips) chips.innerHTML = '';
  if (!memory.tasks || !memory.tasks.length) {
    list.innerHTML = '<div style="font-size:10px;color:#bbb;">タスクなし</div>';
    if (bar) bar.style.display = 'none';
    return;
  }
  if (bar) bar.style.display = 'flex';
  memory.tasks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'task-item' + (t.done ? ' done' : '');
    div.innerHTML = `<div class="task-check"></div><span style="flex:1;font-size:10px;">${t.title}</span>${t.urgent && !t.done ? '<span class="task-urgent">急</span>' : ''}`;
    div.onclick = () => { memory.tasks[i].done = !memory.tasks[i].done; saveMemLocal(); renderTasks(); };
    list.appendChild(div);
    if (chips && !t.done) {
      const chip = document.createElement('div');
      chip.className = 'task-chip' + (t.urgent ? ' urgent' : '');
      chip.textContent = t.title;
      chip.onclick = () => quickSend(t.title + 'の進捗を教えてください');
      chips.appendChild(chip);
    }
  });
}

function renderMemo() {
  const el = document.getElementById('memo-list');
  if (!el) return;
  el.textContent = memory.memo || '—';
}

function loadLocal() {
  try {
    const saved = localStorage.getItem(LOCAL_KEY);
    if (saved) { const d = JSON.parse(saved); history = d.history||[]; displayLog = d.displayLog||[]; driveFileId = d.driveFileId||null; }
  } catch(e) { history=[]; displayLog=[]; }
}

function saveLocal() {
  try {
    history = history.slice(-MAX_STORE);
    displayLog = displayLog.slice(-MAX_STORE);
    localStorage.setItem(LOCAL_KEY, JSON.stringify({ history, displayLog, driveFileId }));
  } catch(e) {}
}

function loadMemLocal() {
  try {
    const saved = localStorage.getItem(MEM_KEY);
    if (saved) { const d = JSON.parse(saved); memory = d; driveMemFileId = d.driveMemFileId||null; }
  } catch(e) {}
}

function saveMemLocal() {
  try {
    localStorage.setItem(MEM_KEY, JSON.stringify({ ...memory, driveMemFileId }));
  } catch(e) {}
}

function loadAuth() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    if (!saved) return null;
    const d = JSON.parse(saved);
    if (Date.now() > d.expiry) { localStorage.removeItem(AUTH_KEY); return null; }
    return d;
  } catch(e) { return null; }
}

function saveAuth(token, email, expiry) {
  try { localStorage.setItem(AUTH_KEY, JSON.stringify({ token, email, expiry })); } catch(e) {}
}

function updateCount() {
  document.getElementById('history-count').textContent = Math.floor(history.length/2) + ' 件';
}

function fmt(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
}

function buildSystemPrompt() {
  const now = new Date();
  const timeStr = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 '+fmt(now.getTime())+'（'+['日','月','火','水','木','金','土'][now.getDay()]+'曜日）';
  let sys = SYSTEM_BASE + '\n\n現在時刻: ' + timeStr;
  if (memory.memo) sys += '\n\nユーザーの記憶情報:\n' + memory.memo;
  if (memory.tasks && memory.tasks.length) {
    const active = memory.tasks.filter(t=>!t.done);
    if (active.length) sys += '\n\n現在のタスク:\n' + active.map(t=>'- '+t.title+(t.urgent?'（急）':'')).join('\n');
  }
  return sys;
}

function renderAll() {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';
  if (!displayLog.length) {
    appendAriaMsg('こんにちは！アリアです。タスク管理や情報整理など、なんでもお任せください。', Date.now());
    return;
  }
  let lastDate = '';
  displayLog.forEach(item => {
    const d = fmtDate(item.ts);
    if (d !== lastDate) { const s=document.createElement('div'); s.className='day-sep'; s.textContent=d; log.appendChild(s); lastDate=d; }
    appendMsgEl(item.role, item.text, item.ts);
  });
  log.scrollTop = log.scrollHeight;
  if (displayLog.length) document.getElementById('quick-btns').style.display='none';
}

function appendMsgEl(role, text, ts) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'aria') {
    div.innerHTML = `<div class="avatar">A</div><div><div class="bubble"></div><div class="msg-time">${fmt(ts)}</div></div>`;
  } else {
    div.innerHTML = `<div><div class="bubble"></div><div class="msg-time">${fmt(ts)}</div></div>`;
  }
  div.querySelector('.bubble').textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendAriaMsg(text, ts) { appendMsgEl('aria', text, ts); }
function appendUserMsg(text, ts) { appendMsgEl('user', text, ts); }

  div.className='msg aria'; div.id='typing-msg';
  div.innerHTML=`<div class="avatar">A</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  log.appendChild(div); log.scrollTop=log.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing-msg'); if(t) t.remove(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function setLoggedIn(email) {
  hideOverlay();
  document.getElementById('user-badge').textContent = email;
  document.getElementById('user-badge').style.display = 'inline-block';
  document.getElementById('login-top-btn').style.display = 'none';
  document.getElementById('menu-btn').style.display = 'flex';
  ['login-side-btn','login-drawer-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) { btn.textContent = 'ログイン済み'; btn.style.opacity = '0.5'; btn.onclick = null; }
  });
}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.appdata email profile',
    callback: async (res) => {
      if (res.error) { setStatus('red', 'ログイン失敗'); return; }
      accessToken = res.access_token;
      const expiry = Date.now() + (res.expires_in * 1000);
      try {
        const infoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
        const info = await infoRes.json();
        const email = info.email || 'ログイン済み';
        saveAuth(accessToken, email, expiry);
        setLoggedIn(email);
      } catch(e) { saveAuth(accessToken, 'ログイン済み', expiry); setLoggedIn('ログイン済み'); }
      setStatus('orange', 'Driveから読み込み中...');
      await loadFromDrive();
      await loadMemFromDrive();
    }
  });
  client.requestAccessToken();
}

async function driveSearch(name) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${name}'&fields=files(id)`,
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  const data = await res.json();
  if (data.error && data.error.code === 401) { localStorage.removeItem(AUTH_KEY); return null; }
  return (data.files && data.files.length > 0) ? data.files[0].id : null;
}

async function driveRead(fileId) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  return await res.json();
}

async function driveWrite(fileId, name, content) {
  const blob = new Blob([JSON.stringify(content)], { type: 'application/json' });
  if (fileId) {
    await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: 'PATCH', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: blob }
    );
    return fileId;
  } else {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name, parents: ['appDataFolder'] })], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form }
    );
    const created = await res.json();
    return created.id;
  }
}

async function loadFromDrive() {
  if (!accessToken) return;
  try {
    const fid = await driveSearch(DRIVE_CHAT_FILE);
    if (fid) {
      driveFileId = fid;
      const data = await driveRead(fid);
      if (data.history && data.displayLog) {
        history = data.history;
        displayLog = data.displayLog;
        saveLocal(); updateCount(); renderAll();
        setStatus('green', 'Drive同期済み — ' + fmt(Date.now()));
        showToast('履歴を読み込みました（' + Math.floor(history.length/2) + '件）');
      } else { setStatus('green', 'Drive接続済み'); }
    } else { setStatus('green', 'Drive接続済み（新規）'); }
  } catch(e) { setStatus('red', 'Drive読み込み失敗'); }
}

async function loadMemFromDrive() {
  if (!accessToken) return;
  try {
    const fid = await driveSearch(DRIVE_MEM_FILE);
    if (fid) {
      driveMemFileId = fid;
      const data = await driveRead(fid);
      if (data) {
        memory = { tasks: data.tasks||[], memo: data.memo||'' };
        saveMemLocal(); renderTasks(); renderMemo();
      }
    }
  } catch(e) {}
}

async function saveToDrive() {
  if (!accessToken || isSyncing) return;
  isSyncing = true;
  setStatus('orange', 'Driveに同期中...');
  try {
    const trimHistory = history.slice(-MAX_STORE);
    const trimDisplay = displayLog.slice(-MAX_STORE);
    driveFileId = await driveWrite(driveFileId, DRIVE_CHAT_FILE, { history: trimHistory, displayLog: trimDisplay });
    driveMemFileId = await driveWrite(driveMemFileId, DRIVE_MEM_FILE, { tasks: memory.tasks, memo: memory.memo });
    saveLocal(); saveMemLocal();
    setStatus('green', 'Drive同期済み — ' + fmt(Date.now()));
  } catch(e) { setStatus('red', 'Drive同期失敗'); }
  isSyncing = false;
}

function clearHistory() {
  if (!confirm('会話の履歴をすべて消去しますか？')) return;
  history=[]; displayLog=[]; driveFileId=null;
  localStorage.removeItem(LOCAL_KEY);
  document.getElementById('chat-log').innerHTML='';
  document.getElementById('quick-btns').style.display='flex';
  updateCount(); setMood('normal');
  appendAriaMsg('履歴を消去しました。また新たにお話しましょう！', Date.now());
  if (accessToken) saveToDrive();
  showToast('履歴を消去しました');
}

async function sendMsg() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  document.getElementById('quick-btns').style.display='none';
  document.getElementById('send-btn').disabled = true;
  const ts = Date.now();
  appendUserMsg(text, ts);
  history.push({ role:'user', content:text });
  displayLog.push({ role:'user', text, ts });
  showTyping();
  try {
    const sendHistory = history.slice(-MAX_SEND * 2);
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1200, system:buildSystemPrompt(), messages:sendHistory })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || 'すみません、うまく返答できませんでした。';
    const metaMatch = raw.match(/ARIA_META:(\{.*?\})/s);
    let mood = 'normal';
    if (metaMatch) {
      try {
        const meta = JSON.parse(metaMatch[1]);
        mood = meta.mood || 'normal';
        if (meta.tasks && meta.tasks.length) {
          meta.tasks.forEach(newTask => {
            const idx = memory.tasks.findIndex(t => t.title === newTask.title);
            if (idx >= 0) { memory.tasks[idx] = { ...memory.tasks[idx], ...newTask }; }
            else { memory.tasks.push(newTask); }
          });
        }
        if (meta.memo) { memory.memo = (memory.memo ? memory.memo + '\n' : '') + meta.memo; }
        renderTasks(); renderMemo(); saveMemLocal();
      } catch(e) {}
    }
    const clean = raw.replace(/\nARIA_META:\{.*?\}/s, '').trim();
    history.push({ role:'assistant', content:raw });
    const replyTs = Date.now();
    displayLog.push({ role:'aria', text:clean, ts:replyTs });
    saveLocal(); updateCount();
    removeTyping(); setMood(mood);
    appendAriaMsg(clean, replyTs);
    saveToDrive();
  } catch(e) {
    removeTyping();
    appendAriaMsg('通信エラーが発生しました。しばらくしてからお試しください。', Date.now());
  }
  document.getElementById('send-btn').disabled = false;
}

function quickSend(text) { document.getElementById('user-input').value=text; sendMsg(); }

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

loadLocal(); loadMemLocal(); renderAll(); renderTasks(); renderMemo(); updateCount();
showOverlay();

if (isMobile()) document.getElementById('menu-btn').style.display = 'none';

window.addEventListener('load', async () => {
  const auth = loadAuth();
  if (auth) {
    accessToken = auth.token;
    setLoggedIn(auth.email);
    setStatus('orange', 'Driveから確認中...');
    await loadFromDrive();
    await loadMemFromDrive();
  }
});
</script>
